<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cartão clonado</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #111, #222);
      color: white;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 30px;
    }

    button {
      padding: 15px 35px;
      font-size: 1.2rem;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: #ff3333;
      color: white;
    }

    .troll {
      display: none;
      font-size: 2.5rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1 id="titulo">⚠️ Cartão clonado ⚠️</h1>

  <button id="botao" onclick="trollar()">Clique aqui</button>

  <div class="troll" id="mensagem">
    😂 Você foi trollado kkkkk 😂
  </div>

  <script>
    function trollar() {
      document.getElementById('titulo').style.display = 'none';
      document.getElementById('botao').style.display = 'none';
      document.getElementById('mensagem').style.display = 'block';
    }
  </script>
</body>
</html>
