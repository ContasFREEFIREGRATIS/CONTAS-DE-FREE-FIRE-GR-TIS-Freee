<div id="hack"></div>

<script>
function iniciarHack(){

  const hack = document.getElementById("hack");

  const navegador = navigator.userAgent;
  const idioma = navigator.language;
  const plataforma = navigator.platform;
  const largura = screen.width;
  const altura = screen.height;

  let bateria = "Desconhecida";

  if(navigator.getBattery){
    navigator.getBattery().then(function(battery){
      bateria = Math.floor(battery.level * 100) + "%";
    });
  }

  const mensagens = [
    "[+] Iniciando protocolo...",
    "[+] Estabelecendo conexão segura...",
    "[+] Conexão criptografada AES-256...",
    "[+] Firewall ignorado...",
    "[+] Coletando dados do dispositivo...",
    "",
    "==============================",
    " DISPOSITIVO ENCONTRADO ",
    "==============================",
    "",
    "[•] Plataforma: " + plataforma,
    "[•] Idioma: " + idioma,
    "[•] Resolução: " + largura + "x" + altura,
    "[•] Bateria: " + bateria,
    "",
    "[+] Analisando navegador...",
    navegador,
    "",
    "[+] Buscando IP...",
    "[+] IP localizado com sucesso...",
    "[+] Acesso root liberado...",
    "[+] Transferindo arquivos...",
    "[+] Verificando contas conectadas...",
    "[+] Acesso concedido...",
    "",
    "⚠ SISTEMA COMPROMETIDO ⚠",
    "",
    "[+] Finalizando processo..."
  ];

  let i = 0;

  const intervalo = setInterval(() => {

    if(i < mensagens.length){

      hack.innerHTML += mensagens[i] + "<br>";
      hack.scrollTop = hack.scrollHeight;

      i++;

    }else{

      hack.innerHTML +=
      "[SYSTEM] conexão mantida...<br>";

    }

  },500);
}
</script>
